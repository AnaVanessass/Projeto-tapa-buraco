<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmas sem Buracos - Recuperar Senha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #E8F5E9, #C8E6C9); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div style="width: 100%; max-width: 450px; padding: 20px;">
        <div class="card" style="padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-key" style="font-size: 50px; color: #2E7D32;"></i>
                <h1 style="font-size: 1.8rem; margin-top: 10px;">Recuperar <span style="color: #2E7D32;">Senha</span></h1>
                <p style="color: #666;">Digite seu e-mail para receber as instruções</p>
            </div>
            
            <div id="passo1">
                <form id="formRecuperar">
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> E-mail cadastrado</label>
                        <input type="email" id="emailRecuperar" placeholder="Digite seu e-mail" required>
                    </div>
                    <button type="submit" class="btn btn-verde" style="width: 100%; justify-content: center;">
                        <i class="fas fa-paper-plane"></i> Enviar código
                    </button>
                </form>
            </div>
            
            <div id="passo2" style="display: none;">
                <div class="alert alert-success" style="margin-bottom: 20px;">
                    <i class="fas fa-check-circle"></i> Código enviado para seu e-mail!
                </div>
                <form id="formCodigo">
                    <div class="input-group">
                        <label><i class="fas fa-qrcode"></i> Código de verificação</label>
                        <input type="text" id="codigo" placeholder="Digite o código recebido" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Nova senha</label>
                        <input type="password" id="novaSenha" placeholder="Digite sua nova senha" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Confirmar nova senha</label>
                        <input type="password" id="confirmarNovaSenha" placeholder="Confirme sua nova senha" required>
                    </div>
                    <button type="submit" class="btn btn-verde" style="width: 100%; justify-content: center;">
                        <i class="fas fa-save"></i> Alterar senha
                    </button>
                </form>
            </div>
            
            <div style="margin-top: 20px; text-align: center;">
                <p><a href="indexteladelogin.html" style="color: #1976D2;">← Voltar para o login</a></p>
            </div>
        </div>
    </div>

    <!-- Modal de Sucesso -->
    <div id="modalSucesso" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle" style="color: #4CAF50;"></i> Senha alterada!</h3>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Sua senha foi alterada com sucesso!</p>
                <p>Agora você pode fazer login com sua nova senha.</p>
            </div>
            <div class="modal-footer">
                <a href="indexteladelogin.html" class="btn btn-verde">Fazer login</a>
            </div>
        </div>
    </div>

    <script>
        let emailRecuperacao = '';
        
        function fecharModal() {
            document.getElementById('modalSucesso').style.display = 'none';
        }
        
        // Passo 1: Enviar código
        document.getElementById('formRecuperar').addEventListener('submit', function(e) {
            e.preventDefault();
            emailRecuperacao = document.getElementById('emailRecuperar').value;
            
            // Verificar se e-mail existe no cadastro
            let usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const usuarioExiste = usuarios.some(u => u.email === emailRecuperacao);
            
            if (!usuarioExiste && emailRecuperacao !== 'admin@palmas.com') {
                alert('E-mail não encontrado no sistema!');
                return;
            }
            
            // Simular envio de código (em produção, seria um e-mail real)
            const codigoSimulado = Math.floor(100000 + Math.random() * 900000);
            sessionStorage.setItem('codigoRecuperacao', codigoSimulado);
            sessionStorage.setItem('emailRecuperacao', emailRecuperacao);
            
            alert(`CÓDIGO DE TESTE: ${codigoSimulado}\n\n(Em produção, este código seria enviado por e-mail)`);
            
            document.getElementById('passo1').style.display = 'none';
            document.getElementById('passo2').style.display = 'block';
        });
        
        // Passo 2: Verificar código e alterar senha
        document.getElementById('formCodigo').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const codigoDigitado = document.getElementById('codigo').value;
            const codigoSalvo = sessionStorage.getItem('codigoRecuperacao');
            const novaSenha = document.getElementById('novaSenha').value;
            const confirmarSenha = document.getElementById('confirmarNovaSenha').value;
            
            if (codigoDigitado !== codigoSalvo) {
                alert('Código inválido! Tente novamente.');
                return;
            }
            
            if (novaSenha !== confirmarSenha) {
                alert('As senhas não coincidem!');
                return;
            }
            
            if (novaSenha.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres!');
                return;
            }
            
            // Atualizar senha do usuário no localStorage
            let usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const emailRec = sessionStorage.getItem('emailRecuperacao');
            
            const usuarioIndex = usuarios.findIndex(u => u.email === emailRec);
            if (usuarioIndex !== -1) {
                usuarios[usuarioIndex].senha = novaSenha;
                localStorage.setItem('usuarios', JSON.stringify(usuarios));
            }
            
            // Limpar dados da recuperação
            sessionStorage.removeItem('codigoRecuperacao');
            sessionStorage.removeItem('emailRecuperacao');
            
            // Mostrar modal de sucesso
            document.getElementById('modalSucesso').style.display = 'flex';
        });
    </script>
</body>
</html>
