<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palmas sem Buracos - Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #E8F5E9, #C8E6C9); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

    <div style="width: 100%; max-width: 500px; padding: 20px;">
        <div class="card" style="padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <i class="fas fa-road" style="font-size: 50px; color: #2E7D32;"></i>
                <h1 style="font-size: 1.8rem; margin-top: 10px;">Criar <span style="color: #2E7D32;">Conta</span></h1>
                <p style="color: #666;">Cadastre-se e comece a participar</p>
            </div>
            
            <form id="formCadastro">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nome completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-id-card"></i> CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-phone"></i> Telefone</label>
                    <input type="tel" id="telefone" placeholder="(63) 99999-9999">
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Confirmar senha</label>
                    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha" required>
                </div>
                
                <div class="input-group">
                    <label>
                        <input type="checkbox" id="termos" required>
                        Li e aceito os <a href="#">Termos de Uso</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-verde" style="width: 100%; justify-content: center;">
                    <i class="fas fa-user-plus"></i> Cadastrar
                </button>
            </form>
            
            <div style="margin-top: 20px; text-align: center;">
                <p>Já tem uma conta? <a href="indexteladelogin.html" style="color: #1976D2;">Faça login</a></p>
            </div>
        </div>
    </div>

    <!-- Modal de Sucesso -->
    <div id="modalSucesso" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-check-circle" style="color: #4CAF50;"></i> Cadastro realizado!</h3>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p>Seu cadastro foi realizado com sucesso!</p>
                <p>Agora você pode fazer login e começar a registrar denúncias.</p>
            </div>
            <div class="modal-footer">
                <a href="indexteladelogin.html" class="btn btn-verde">Ir para Login</a>
            </div>
        </div>
    </div>

    <script>
        function fecharModal() {
            document.getElementById('modalSucesso').style.display = 'none';
        }
        
        document.getElementById('formCadastro').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            
            if (senha !== confirmarSenha) {
                alert('As senhas não coincidem!');
                return;
            }
            
            if (senha.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres!');
                return;
            }
            
            // Salvar dados do usuário no localStorage
            const novoUsuario = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                senha: senha,
                dataCadastro: new Date().toISOString()
            };
            
            // Recuperar usuários existentes ou criar novo array
            let usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            usuarios.push(novoUsuario);
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            
            // Mostrar modal de sucesso
            document.getElementById('modalSucesso').style.display = 'flex';
            
            // Limpar formulário
            this.reset();
        });
        
        // Máscara para CPF
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d)/, '$1.$2');
                value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                e.target.value = value;
            }
        });
        
        // Máscara para telefone
        document.getElementById('telefone').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\d{2})(\d)/, '($1) $2');
                value = value.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = value;
            }
        });
    </script>
</body>
</html>
